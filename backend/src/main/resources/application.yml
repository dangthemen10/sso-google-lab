server:
  port: 8080
  # Tells Spring Boot to trust X-Forwarded-* headers from the Next.js reverse proxy.
  # This ensures Spring Security generates redirect URIs using the public FE domain
  # (http://localhost:3000) instead of the internal BE domain (http://localhost:8080).
  forward-headers-strategy: framework

spring:
  session:
    store-type: redis
    timeout: 30m
  data:
    redis:
      client-type: jedis

      # ── Chế độ 1: Single node (local dev / Docker Compose) ─────────────
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

      # ── Chế độ 2: Sentinel — High Availability (1 master, N replicas) ──
      # Khi master chết, Sentinel tự bầu replica lên làm master mới.
      # Bật bằng cách comment Chế độ 1 và bỏ comment block bên dưới:
      #
      # sentinel:
      #   master: ${REDIS_SENTINEL_MASTER:mymaster}
      #   nodes:
      #     - ${REDIS_SENTINEL_NODE_1:sentinel1:26379}
      #     - ${REDIS_SENTINEL_NODE_2:sentinel2:26379}
      #     - ${REDIS_SENTINEL_NODE_3:sentinel3:26379}

      # ── Chế độ 3: Cluster — Horizontal Scaling (data sharding) ─────────
      # Dữ liệu được phân tán (sharding) trên nhiều node.
      # Bật bằng cách comment Chế độ 1 và bỏ comment block bên dưới:
      #
      # cluster:
      #   nodes:
      #     - ${REDIS_CLUSTER_NODE_1:redis1:6379}
      #     - ${REDIS_CLUSTER_NODE_2:redis2:6379}
      #     - ${REDIS_CLUSTER_NODE_3:redis3:6379}
      #   max-redirects: 3

      jedis:
        pool:
          max-active: 10 # số connection tối đa trong pool
          max-idle: 5
          min-idle: 1
          max-wait: 2000ms # timeout khi pool đầy
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # Hardcode to the FE public URL.
            # Google redirects the browser to this URL after authentication.
            # Next.js rewrites rule will forward the request down to this BE.
            redirect-uri: 'http://localhost:3000/api/be/login/oauth2/code/google'
            scope:
              - openid
              - email
              - profile
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            redirect-uri: 'http://localhost:3000/api/be/login/oauth2/code/azure'
            authorization-grant-type: authorization_code
            scope:
              - openid
              - email
              - profile
            client-name: Microsoft
        provider:
          google:
            user-name-attribute: sub
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

logging:
  level:
    org.springframework.security: INFO
